name: Deploy Testing Build

on:
    pull_request:
        paths:
            - .github/workflows/deploy-testing.yml
    workflow_dispatch:
        inputs:
            label:
                description: 'Label to filter PRs'
                required: false
                default: 'testing'
                type: string

env:
    REGISTRY: ghcr.io
    REGISTRY_PREFIX: ghcr.io/detroitneverends/aregrp/
    TAG: testing-${{ github.run_number }}

jobs:
    merge-prs:
        name: Merge PRs
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: read
        outputs:
            has_prs: ${{ steps.merge.outputs.has_prs }}
            merge_branch: ${{ steps.merge.outputs.merge_branch }}
            pr_list: ${{ steps.merge.outputs.pr_list }}
            merge_report: ${{ steps.merge.outputs.merge_report }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Summary — Checkout
              if: success()
              run: |
                  {
                      echo "### Checkout"
                      echo "Репозиторий получен, \`fetch-depth: 0\`."
                      echo ""
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Configure Git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Summary — Git config
              if: success()
              run: |
                  {
                      echo "### Configure Git"
                      echo "Пользователь для коммитов: \`github-actions[bot]\`."
                      echo ""
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Find and merge PRs
              id: merge
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  LABEL: ${{ github.event.inputs.label || 'testing' }}
              run: |
                  set -eu
                  REPORT_FILE="$(mktemp)"

                  {
                      echo "### Find and merge PRs"
                      echo "Поиск открытых PR с меткой: \`$LABEL\`"
                      echo ""
                  } >> "$GITHUB_STEP_SUMMARY"

                  echo "🔍 Searching for PRs with label: $LABEL"

                  PRS_JSON=$(gh pr list --state open --label "$LABEL" --json number,headRefName,title,body,url,author || echo '[]')
                  COUNT=$(echo "$PRS_JSON" | jq 'length')

                  if [ "$COUNT" -eq 0 ]; then
                      echo "ℹ️  No PRs found with label '$LABEL'"
                      echo "has_prs=false" >> "$GITHUB_OUTPUT"
                      echo "merge_branch=main" >> "$GITHUB_OUTPUT"
                      echo "pr_list=" >> "$GITHUB_OUTPUT"
                      {
                          echo "**Результат:** открытых PR с меткой \`$LABEL\` нет."
                          echo ""
                      } >> "$GITHUB_STEP_SUMMARY"
                      echo "## Merge PRs — итог" >> "$REPORT_FILE"
                      echo "Нет открытых PR с меткой \`$LABEL\`. Сборка выполняется с \`main\`." >> "$REPORT_FILE"
                      {
                          echo 'merge_report<<MERGE_REPORT_EOF'
                          cat "$REPORT_FILE"
                          echo 'MERGE_REPORT_EOF'
                      } >> "$GITHUB_OUTPUT"
                      exit 0
                  fi

                  echo "✅ Found $COUNT PR(s)"

                  git checkout main
                  git pull origin main

                  MERGE_BRANCH="testing-build"
                  git branch -D "$MERGE_BRANCH" 2>/dev/null || true
                  git push origin --delete "$MERGE_BRANCH" 2>/dev/null || true
                  git checkout -b "$MERGE_BRANCH"

                  MERGED_LIST=""
                  FAILED_LIST=""
                  MERGED_PR_IDS=""

                  for ((i = 0; i < COUNT; i++)); do
                      pr=$(echo "$PRS_JSON" | jq -c ".[$i]")
                      PR_NUMBER=$(echo "$pr" | jq -r '.number')
                      BRANCH=$(echo "$pr" | jq -r '.headRefName')
                      TITLE=$(echo "$pr" | jq -r '.title')
                      URL=$(echo "$pr" | jq -r '.url')
                      AUTHOR=$(echo "$pr" | jq -r '.author.login // "unknown"')
                      BODY=$(echo "$pr" | jq -r '.body // ""')
                      BODY_SHORT=$(printf '%s' "$BODY" | head -c 800)
                      if [ "${#BODY}" -gt 800 ]; then
                          BODY_SHORT="${BODY_SHORT}…"
                      fi

                      echo ""
                      echo "========================================="
                      echo "Processing PR #$PR_NUMBER: $TITLE"
                      echo "Branch: $BRANCH"
                      echo "========================================="

                      git fetch origin "$BRANCH"

                      MERGE_ERR="$(mktemp)"
                      if git merge --no-ff --no-edit "origin/$BRANCH" -m "Merge PR #$PR_NUMBER: $TITLE" 2>"$MERGE_ERR"; then
                          echo "✅ Successfully merged PR #$PR_NUMBER"
                          MERGED_PR_IDS="${MERGED_PR_IDS} #${PR_NUMBER}"
                          MERGED_LIST="${MERGED_LIST}- **#${PR_NUMBER}** — [${TITLE}](${URL})"$'\n'
                          MERGED_LIST="${MERGED_LIST}  - **Автор:** \`${AUTHOR}\`"$'\n'
                          MERGED_LIST="${MERGED_LIST}  - **Описание:** ${BODY_SHORT:-_нет текста_}"$'\n'
                          MERGED_LIST="${MERGED_LIST}"$'\n'
                      else
                          ERR_TEXT=$(head -c 1200 "$MERGE_ERR" || true)
                          echo "❌ Failed to merge PR #$PR_NUMBER"
                          git merge --abort 2>/dev/null || true
                          FAILED_LIST="${FAILED_LIST}- **#${PR_NUMBER}** — [${TITLE}](${URL})"$'\n'
                          FAILED_LIST="${FAILED_LIST}  - **Автор:** \`${AUTHOR}\`"$'\n'
                          FAILED_LIST="${FAILED_LIST}  - **Описание:** ${BODY_SHORT:-_нет текста_}"$'\n'
                          FAILED_LIST="${FAILED_LIST}  - **Ошибка:** конфликт слияния или ошибка git. Фрагмент лога:"$'\n'
                          FAILED_LIST="${FAILED_LIST}  \`\`\`"$'\n'
                          FAILED_LIST="${FAILED_LIST}$(printf '%s' "$ERR_TEXT" | sed 's/^/  /')"$'\n'
                          FAILED_LIST="${FAILED_LIST}  \`\`\`"$'\n'
                          FAILED_LIST="${FAILED_LIST}"$'\n'
                      fi
                      rm -f "$MERGE_ERR"
                  done

                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "#### Успешно влиты" >> "$GITHUB_STEP_SUMMARY"
                  if [ -n "$MERGED_LIST" ]; then
                      echo "$MERGED_LIST" >> "$GITHUB_STEP_SUMMARY"
                  else
                      echo "_нет_" >> "$GITHUB_STEP_SUMMARY"
                  fi
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "#### Ошибки слияния" >> "$GITHUB_STEP_SUMMARY"
                  if [ -n "$FAILED_LIST" ]; then
                      echo "$FAILED_LIST" >> "$GITHUB_STEP_SUMMARY"
                  else
                      echo "_нет_" >> "$GITHUB_STEP_SUMMARY"
                  fi
                  echo "" >> "$GITHUB_STEP_SUMMARY"

                  {
                      echo "## Merge PRs — итог"
                      echo ""
                      echo "### Успешно померженные PR"
                      echo ""
                      if [ -n "$MERGED_LIST" ]; then
                          echo "$MERGED_LIST"
                      else
                          echo "_Нет успешных мержей._"
                      fi
                      echo ""
                      echo "### Не удалось померженные PR"
                      echo ""
                      if [ -n "$FAILED_LIST" ]; then
                          echo "$FAILED_LIST"
                      else
                          echo "_Нет._"
                      fi
                      echo ""
                  } >> "$REPORT_FILE"

                  if [ -n "$MERGED_LIST" ]; then
                      echo "has_prs=true" >> "$GITHUB_OUTPUT"
                      echo "merge_branch=$MERGE_BRANCH" >> "$GITHUB_OUTPUT"
                      echo "pr_list=${MERGED_PR_IDS# }" >> "$GITHUB_OUTPUT"
                      git push -f origin "$MERGE_BRANCH"
                  else
                      echo "ℹ️  No PRs were successfully merged."
                      echo "has_prs=false" >> "$GITHUB_OUTPUT"
                      echo "merge_branch=main" >> "$GITHUB_OUTPUT"
                      echo "pr_list=" >> "$GITHUB_OUTPUT"
                  fi

                  {
                      echo 'merge_report<<MERGE_REPORT_EOF'
                      cat "$REPORT_FILE"
                      echo 'MERGE_REPORT_EOF'
                  } >> "$GITHUB_OUTPUT"

                  rm -f "$REPORT_FILE"

            - name: Summary — merge job (суммарно)
              if: always()
              env:
                  MERGE_REPORT: ${{ steps.merge.outputs.merge_report }}
              run: |
                  {
                      echo "## Merge PRs — суммарный отчёт"
                      echo ""
                      if [ -n "${MERGE_REPORT:-}" ]; then
                          echo "$MERGE_REPORT"
                      else
                          echo "_Отчёт недоступен (шаг не выполнен или сбой)._"
                      fi
                      echo ""
                  } >> "$GITHUB_STEP_SUMMARY"

    build-and-push:
        name: Build and Push
        needs: merge-prs
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout merged branch
              uses: actions/checkout@v6
              with:
                  ref: ${{ needs.merge-prs.outputs.merge_branch || 'main' }}

            - name: Summary — Checkout (build)
              run: |
                  {
                      echo "### Checkout"
                      echo "Ветка: \`${{ needs.merge-prs.outputs.merge_branch || 'main' }}\`"
                      if [ "${{ needs.merge-prs.outputs.has_prs }}" != "true" ]; then
                          echo "Без смерженных PR с меткой — образы собираются с \`main\`."
                      fi
                      echo ""
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Summary — Buildx
              run: |
                  {
                      echo "### Docker Buildx"
                      echo "Buildx настроен."
                      echo ""
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Log in to the Container registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Summary — Registry login
              run: |
                  {
                      echo "### Вход в Container registry"
                      echo "Реестр: \`${{ env.REGISTRY }}\`, пользователь: \`${{ github.actor }}\`"
                      echo ""
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Create temporary .env files for build validation
              run: |
                  mkdir -p backend
                  touch backend/.env backend/.env.postgres
                  echo "Created temporary .env files for docker-compose validation"

            - name: Summary — временные .env
              run: |
                  {
                      echo "### Временные .env"
                      echo "Созданы пустые \`backend/.env\` и \`backend/.env.postgres\` для валидации compose."
                      echo ""
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Build and Push
              env:
                  REGISTRY_PREFIX: ${{ env.REGISTRY_PREFIX }}
                  TAG: ${{ env.TAG }}
                  VITE_YANDEX_MAPS_API_KEY: ${{ secrets.YANDEX_MAPS_API_KEY }}
              run: |
                  echo "🔨 Building from branch: ${{ needs.merge-prs.outputs.merge_branch || 'main' }}"
                  echo "📦 Merged PRs:${{ needs.merge-prs.outputs.pr_list || '(нет)' }}"
                  echo "🏷️  Tag: ${{ env.TAG }}"
                  docker compose build && docker compose push

            - name: Summary — Build and Push
              if: success()
              run: |
                  {
                      echo "### Build and Push"
                      echo "- Образы собраны и отправлены в реестр."
                      echo "- **TAG:** \`${{ env.TAG }}\`"
                      echo "- **REGISTRY_PREFIX:** \`${{ env.REGISTRY_PREFIX }}\`"
                      if [ "${{ needs.merge-prs.outputs.has_prs }}" = "true" ]; then
                          echo "- **PR (кратко):** ${{ needs.merge-prs.outputs.pr_list }}"
                      else
                          echo "- **PR:** нет успешных мержей."
                      fi
                      echo ""
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Summary — job Build and Push (суммарно)
              if: always()
              run: |
                  {
                      echo "## Build and Push — суммарно"
                      if [ "${{ job.status }}" = "success" ]; then
                          echo "Статус: **успех** — образы \`${{ env.TAG }}\` запушены."
                      else
                          echo "Статус: **ошибка** — см. логи шагов выше."
                      fi
                      echo ""
                  } >> "$GITHUB_STEP_SUMMARY"

    deploy:
        name: Deploy to Testing
        needs: [merge-prs, build-and-push]
        runs-on: ubuntu-latest

        steps:
            - name: Checkout merged branch
              uses: actions/checkout@v6
              with:
                  ref: ${{ needs.merge-prs.outputs.merge_branch || 'main' }}

            - name: Summary — Checkout (deploy)
              run: |
                  {
                      echo "### Checkout"
                      echo "Ветка: \`${{ needs.merge-prs.outputs.merge_branch || 'main' }}\`"
                      if [ "${{ needs.merge-prs.outputs.has_prs }}" != "true" ]; then
                          echo "Деплой образов, собранных с \`main\` (без смерженных PR с меткой)."
                      fi
                      echo ""
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Copy docker-compose via SCP
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  source: "docker-compose.yml"
                  target: "/home/${{ secrets.VPS_USER }}/aregrp/"

            - name: Summary — SCP docker-compose
              if: success()
              run: |
                  {
                      echo "### Копирование docker-compose"
                      echo "Файл \`docker-compose.yml\` скопирован на VPS."
                      echo ""
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Create environment files from secrets
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  script: |
                      cd ~/aregrp/
                      mkdir -p backend

                      echo "${{ secrets.ENV_FILE }}" > backend/.env
                      echo "${{ secrets.ENV_POSTGRES_FILE }}" > backend/.env.postgres

                      if [ -s backend/.env ] && [ -s backend/.env.postgres ]; then
                          echo "✅ Environment files created successfully"
                      else
                          echo "❌ ERROR: Environment files are empty!"
                          exit 1
                      fi

            - name: Summary — env на сервере
              if: success()
              run: |
                  {
                      echo "### Environment на сервере"
                      echo "Файлы \`backend/.env\` и \`backend/.env.postgres\` созданы из секретов (непустые)."
                      echo ""
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Deploy containers
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  script: |
                      cd ~/aregrp/

                      sudo mkdir -p /var/lib/aregrp-data/postgres_data
                      sudo mkdir -p /var/lib/aregrp-data/media
                      sudo mkdir -p /var/lib/aregrp-data/static

                      sudo chown -R 999:999 /var/lib/aregrp-data/postgres_data || true
                      sudo chmod 700 /var/lib/aregrp-data/postgres_data || true
                      sudo chown -R $USER:$USER /var/lib/aregrp-data/media /var/lib/aregrp-data/static || true
                      sudo chmod -R 755 /var/lib/aregrp-data/media /var/lib/aregrp-data/static || true

                      echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

                      export REGISTRY_PREFIX=${{ env.REGISTRY_PREFIX }}
                      export TAG=${{ env.TAG }}
                      export VITE_YANDEX_MAPS_API_KEY=${{ secrets.YANDEX_MAPS_API_KEY }}

                      docker compose pull
                      docker compose up -d --remove-orphans

                      echo "Checking containers..."
                      docker compose ps

                      docker image prune -f

            - name: Summary — контейнеры
              if: success()
              run: |
                  {
                      echo "### Деплой контейнеров"
                      echo "Выполнены \`docker compose pull\`, \`up -d\`, проверка \`ps\`, prune образов."
                      echo "- **TAG:** \`${{ env.TAG }}\`"
                      echo ""
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Notify success
              if: success()
              run: |
                  echo "✅ Successfully deployed testing build"
                  echo "📦 Merged PRs:${{ needs.merge-prs.outputs.pr_list || '(нет)' }}"
                  echo "🌿 Branch: ${{ needs.merge-prs.outputs.merge_branch || 'main' }}"
                  echo "🏷️  Tag: ${{ env.TAG }}"

            - name: Summary — Deploy Testing (итоговый)
              if: always()
              env:
                  MERGE_REPORT: ${{ needs.merge-prs.outputs.merge_report }}
              run: |
                  {
                      echo "# Deploy Testing Build — итоговый summary"
                      echo ""
                      echo "## Параметры запуска"
                      echo "- **Run:** ${{ github.run_id }}"
                      echo "- **Ветка сборки:** \`${{ needs.merge-prs.outputs.merge_branch || 'main' }}\`"
                      echo "- **Тег образов:** \`${{ env.TAG }}\`"
                      echo ""
                      echo "## PR: успешные и неудачные мержи"
                      echo ""
                      if [ -n "${MERGE_REPORT:-}" ]; then
                          echo "$MERGE_REPORT"
                      else
                          echo "_Отчёт по PR недоступен._"
                      fi
                      echo ""
                      echo "## Статусы джобов"
                      echo "- **Merge PRs:** ${{ needs.merge-prs.result }}"
                      echo "- **Build and Push:** ${{ needs.build-and-push.result }}"
                      echo "- **Deploy to Testing:** ${{ job.status }}"
                      echo ""
                      if [ "${{ job.status }}" = "success" ]; then
                          echo "✅ **Деплой на testing завершён успешно.**"
                      else
                          echo "❌ **Деплой завершился с ошибкой** — см. логи шагов."
                      fi
                      echo ""
                  } >> "$GITHUB_STEP_SUMMARY"
