name: Deploy Testing Build

on:
    pull_request:
        paths:
          - .github/workflows/deploy-testing-smart.yml
    # Ручной запуск с возможностью указать лейбл
    workflow_dispatch:
        inputs:
            label:
                description: 'Label to filter PRs'
                required: false
                default: 'testing'
                type: string

env:
    REGISTRY: ghcr.io
    REGISTRY_PREFIX: ghcr.io/detroitneverends/aregrp/
    TAG: testing-${{ github.run_number }}

jobs:
    merge-prs:
        name: Merge PRs
        runs-on: ubuntu-latest
        permissions:
            contents: write
        outputs:
            has_prs: ${{ steps.merge.outputs.has_prs }}
            merge_branch: ${{ steps.merge.outputs.merge_branch }}
            pr_list: ${{ steps.merge.outputs.pr_list }}
        
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Configure Git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Find and merge PRs
              id: merge
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  LABEL: ${{ github.event.inputs.label || 'testing' }}
              run: |
                  echo "🔍 Searching for PRs with label: $LABEL"
                  
                  # Получаем список открытых PR с нужным лейблом
                  PRS=$(gh pr list --state open --label "$LABEL" --json number,headRefName,title --jq '.[] | "\(.number)|\(.headRefName)|\(.title)"')
                  
                  if [ -z "$PRS" ]; then
                      echo "❌ No PRs found with label '$LABEL'"
                      echo "has_prs=false" >> $GITHUB_OUTPUT
                      exit 0
                  fi
                  
                  echo "✅ Found PRs:"
                  echo "$PRS"
                  
                  # Переключаемся на main
                  git checkout main
                  git pull origin main
                  
                  # Имя ветки для мержа с простым названием
                  MERGE_BRANCH="testing-build"
                  
                  # Удаляем старую ветку если существует
                  git branch -D "$MERGE_BRANCH" 2>/dev/null || true
                  git push origin --delete "$MERGE_BRANCH" 2>/dev/null || true
                  
                  # Создаем новую ветку
                  git checkout -b "$MERGE_BRANCH"
                  
                  MERGED_PRS=""
                  FAILED_PRS=""
                  
                  # Мержим каждый PR
                  while IFS='|' read -r PR_NUMBER BRANCH TITLE; do
                      echo ""
                      echo "========================================="
                      echo "Processing PR #$PR_NUMBER: $TITLE"
                      echo "Branch: $BRANCH"
                      echo "========================================="
                      
                      # Получаем последние изменения из ветки PR
                      git fetch origin "$BRANCH"
                      
                      # Пытаемся смержить
                      if git merge --no-ff --no-edit "origin/$BRANCH" -m "Merge PR #$PR_NUMBER: $TITLE"; then
                          echo "✅ Successfully merged PR #$PR_NUMBER"
                          MERGED_PRS="$MERGED_PRS #$PR_NUMBER"
                      else
                          echo "❌ Failed to merge PR #$PR_NUMBER (conflicts)"
                          FAILED_PRS="$FAILED_PRS #$PR_NUMBER"
                          # Отменяем неудачный мерж
                          git merge --abort || true
                      fi
                  done <<< "$PRS"
                  
                  echo ""
                  echo "========================================="
                  echo "Merge Summary"
                  echo "========================================="
                  
                  if [ -n "$MERGED_PRS" ]; then
                      echo "✅ Successfully merged PRs:$MERGED_PRS"
                      echo "has_prs=true" >> $GITHUB_OUTPUT
                      echo "merge_branch=$MERGE_BRANCH" >> $GITHUB_OUTPUT
                      echo "pr_list=$MERGED_PRS" >> $GITHUB_OUTPUT
                      
                      # Пушим ветку
                      git push -f origin "$MERGE_BRANCH"
                      
                  else
                      echo "❌ No PRs were successfully merged"
                      echo "has_prs=false" >> $GITHUB_OUTPUT
                  fi
                  
                  if [ -n "$FAILED_PRS" ]; then
                      echo "⚠️  Failed to merge PRs (conflicts):$FAILED_PRS"
                  fi

    build-and-push:
        name: Build and Push
        needs: merge-prs
        if: needs.merge-prs.outputs.has_prs == 'true'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        
        steps:
            - name: Checkout merged branch
              uses: actions/checkout@v4
              with:
                  ref: ${{ needs.merge-prs.outputs.merge_branch }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to the Container registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Create temporary .env files for build validation
              run: |
                  mkdir -p backend
                  touch backend/.env backend/.env.postgres
                  echo "Created temporary .env files for docker-compose validation"

            - name: Build and Push
              env:
                  REGISTRY_PREFIX: ${{ env.REGISTRY_PREFIX }}
                  TAG: ${{ env.TAG }}
                  VITE_YANDEX_MAPS_API_KEY: ${{ secrets.YANDEX_MAPS_API_KEY }}
              run: |
                  echo "🔨 Building from branch: ${{ needs.merge-prs.outputs.merge_branch }}"
                  echo "📦 Merged PRs:${{ needs.merge-prs.outputs.pr_list }}"
                  echo "🏷️  Tag: ${{ env.TAG }}"
                  docker compose build && docker compose push

    deploy:
        name: Deploy to Testing
        needs: [merge-prs, build-and-push]
        if: needs.merge-prs.outputs.has_prs == 'true'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout merged branch
              uses: actions/checkout@v4
              with:
                  ref: ${{ needs.merge-prs.outputs.merge_branch }}

            - name: Copy docker-compose via SCP
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  source: "docker-compose.yml"
                  target: "/home/${{ secrets.VPS_USER }}/aregrp/"

            - name: Create environment files from secrets
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  script: |
                      cd ~/aregrp/
                      mkdir -p backend
                      
                      echo "${{ secrets.ENV_FILE }}" > backend/.env
                      echo "${{ secrets.ENV_POSTGRES_FILE }}" > backend/.env.postgres
                      
                      if [ -s backend/.env ] && [ -s backend/.env.postgres ]; then
                          echo "✅ Environment files created successfully"
                      else
                          echo "❌ ERROR: Environment files are empty!"
                          exit 1
                      fi

            - name: Deploy containers
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  script: |
                      cd ~/aregrp/
                      
                      # Создаем директории для персистентных данных
                      sudo mkdir -p /var/lib/aregrp-data/postgres_data
                      sudo mkdir -p /var/lib/aregrp-data/media
                      sudo mkdir -p /var/lib/aregrp-data/static
                      
                      sudo chown -R 999:999 /var/lib/aregrp-data/postgres_data || true
                      sudo chmod 700 /var/lib/aregrp-data/postgres_data || true
                      sudo chown -R $USER:$USER /var/lib/aregrp-data/media /var/lib/aregrp-data/static || true
                      sudo chmod -R 755 /var/lib/aregrp-data/media /var/lib/aregrp-data/static || true
                      
                      # Логинимся в реестр
                      echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
                      
                      # Экспортируем переменные
                      export REGISTRY_PREFIX=${{ env.REGISTRY_PREFIX }}
                      export TAG=${{ env.TAG }}
                      export VITE_YANDEX_MAPS_API_KEY=${{ secrets.YANDEX_MAPS_API_KEY }}
                      
                      # Деплоим
                      docker compose pull
                      docker compose up -d --remove-orphans
                      
                      echo "Checking containers..."
                      docker compose ps
                      
                      # Чистим старые образы
                      docker image prune -f

            - name: Notify success
              if: success()
              run: |
                  echo "✅ Successfully deployed testing build"
                  echo "📦 Merged PRs:${{ needs.merge-prs.outputs.pr_list }}"
                  echo "🌿 Branch: ${{ needs.merge-prs.outputs.merge_branch }}"
                  echo "🏷️  Tag: ${{ env.TAG }}"