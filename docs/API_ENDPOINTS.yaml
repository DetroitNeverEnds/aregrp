# ═══════════════════════════════════════════════════════════════════
# API v1 — эндпоинты и схемы
# ═══════════════════════════════════════════════════════════════════
#
# base: /api/v1
#
#   auth          — вход, регистрация, токены, сброс пароля
#   site_settings — настройки сайта, контакты, обратная связь
#   buildings     — каталог зданий, инфо, этажи
#   premises      — помещения (каталог, аренда, продажа, детали)
#   cases         — кейсы
#   user          — профиль, объекты, бронирования
#
# ═══════════════════════════════════════════════════════════════════

base: /api/v1

# ───────────────────────────────────────────────────────────────────
# AUTH
# ───────────────────────────────────────────────────────────────────

auth:
  - POST /auth/login
  - POST /auth/register
  - POST /auth/logout
  - POST /auth/refresh-token
  - POST /auth/password-reset
  - POST /auth/password-reset/confirm


# ───────────────────────────────────────────────────────────────────
# SITE SETTINGS
# ───────────────────────────────────────────────────────────────────

site_settings:
  - GET /site-settings/main-info
  - GET /site-settings/contacts
  - POST /feedback?origin


# ───────────────────────────────────────────────────────────────────
# BUILDINGS
# ───────────────────────────────────────────────────────────────────

buildings:
  - GET /buildings/
    список зданий (пагинация: page, page_size)
    query:
      page: number
      page_size: number
    response:
      items:
        uuid: string
        title: string
        address: string
        description: string
        min_sale_price: number   # optional
        min_rent_price: number   # optional
        media: MedialList        # url=card.webp (превью), full_url=detail.webp/photo или .mp4/video
      total: number
      page: number
      page_size: number
      total_pages: number

  - GET /buildings/<uuid>
    здание по UUID (media_categories, media)
    response:
      uuid: string
      title: string
      address: string
      description: string
      total_floors: number     # optional
      year_built: number      # optional
      min_sale_price: number  # optional
      min_rent_price: number  # optional
      media_categories: [string]   # уникальные категории из фото и видео
      media: [BuildingMediaItem]
    BuildingMediaItem:
      type: "photo" | "video"
      category: string
      url: string              # превью (card.webp)
      full_url: string         # detail.webp для photo, оригинал .mp4 для video
      title: string            # optional

  - GET /buildings/<uuid>/floor/<number>
    информация об этаже (TODO)


# ───────────────────────────────────────────────────────────────────
# FLOORS
# ───────────────────────────────────────────────────────────────────

floors:
  - GET /floors/<building_uuid>/<floor_id>
    данные этажа:
      building_uuid: string
      floor_id: string
      title: string
      floor_number: number   # deprecated
      schema_svg: string # содержимое SVG или null
      premises:
        - uuid: string
          name: string
          label_area: string
          label_price: string
          is_occupied: boolean


# ───────────────────────────────────────────────────────────────────
# PREMISES
# ───────────────────────────────────────────────────────────────────

premises:
  - GET /premises/buildings
    список зданий для фильтра — просто массив [{ uuid, name, address }, ...], без пагинации

  - GET /premises
    каталог помещений (с пагинацией: page, page_size в query; items, total, total_pages в ответе)
    response:
      items:
        uuid: string
        name: string
        price: number
        address: string
        floor_id: string   # optional
        floor_title: string   # optional
        area: number
        has_tenant: boolean
        media: object
      total: number
      page: number
      page_size: number
      total_pages: number

  - GET /premises/<uuid>
    детали помещения
    response:
      uuid: string
      name: string
      price: number
      address: string
      floor_id: string
      floor_title: string   # optional
      area: number
      has_tenant: boolean
      media: object
      description: string      # optional
      price_per_sqm: number   # optional
      ceiling_height: number   # optional
      has_windows: boolean
      has_parking: boolean
      is_furnished: boolean

  - POST /referrals/links
    генерация реферальной ссылки для помещения
    body:
      premise_uuid: string
      phone: string
    response:
      code: string
      url: string
      premise_uuid: string
      created_at: string

payments:
  - POST /payments/
    создание платежа
    notes:
      - если в cookie есть referral_code и код соответствует помещению, ссылка привязывается к платежу


# ───────────────────────────────────────────────────────────────────
# CASES
# ───────────────────────────────────────────────────────────────────

cases:
  - GET /cases/<cat>
    strategies

  - GET /cases/all
    все кейсы


# ───────────────────────────────────────────────────────────────────
# USER
# ───────────────────────────────────────────────────────────────────

user:
  - GET /profile/user
    информация о пользователе

  - PUT /profile/profile
    обновление профиля

  - GET /profile/objects
    объекты пользователя

  - GET /profile/bookings
    бронирования


# ───────────────────────────────────────────────────────────────────
# ОБЩИЕ СХЕМЫ
# ───────────────────────────────────────────────────────────────────

MedialList:
  type: "photo | video"
  link: string
