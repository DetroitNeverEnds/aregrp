# ═══════════════════════════════════════════════════════════════════
# API v1 — эндпоинты и схемы
# ═══════════════════════════════════════════════════════════════════
#
# base: /api/v1
#
#   auth          — вход, регистрация, токены, сброс пароля
#   site_settings — настройки сайта, контакты, обратная связь
#   buildings     — каталог зданий, инфо, этажи
#   premises      — помещения (каталог, аренда, продажа, детали)
#   cases         — кейсы
#   user          — профиль, объекты, бронирования
#
# ═══════════════════════════════════════════════════════════════════

base: /api/v1

# ───────────────────────────────────────────────────────────────────
# AUTH
# ───────────────────────────────────────────────────────────────────

auth:
  - POST /auth/login
  - POST /auth/register
  - POST /auth/logout
  - POST /auth/refresh-token
  - POST /auth/password-reset
  - POST /auth/password-reset/confirm


# ───────────────────────────────────────────────────────────────────
# SITE SETTINGS
# ───────────────────────────────────────────────────────────────────

site_settings:
  - GET /site-settings/main-info
  - GET /site-settings/contacts
  - POST /feedback?origin


# ───────────────────────────────────────────────────────────────────
# BUILDINGS
# ───────────────────────────────────────────────────────────────────

buildings:
  - GET /buildings/
    список зданий (с пагинацией: items, total, page, page_size, total_pages)
    response:
      items:
        uuid: string
        title: string
        address: string
        description: string
        min_sale_price: number   # optional
        min_rent_price: number   # optional
        media: MedialList
      total: number
      page: number
      page_size: number
      total_pages: number

  - GET /buildings/catalogue/<uuid>
    информация о здании
    response:
      uuid: string
      title: string
      address: string
      description: string
      min_sale_price: number   # optional
      min_rent_price: number   # optional
      media: MedialList

  - GET /buildings/info/<uuid>/floor/<number>
    информация об этаже (TODO)


# ───────────────────────────────────────────────────────────────────
# PREMISES
# ───────────────────────────────────────────────────────────────────

premises:
  - GET /premises/buildings
    список зданий для фильтра — просто массив [{ uuid, name, address }, ...], без пагинации

  - GET /premises
    каталог помещений (с пагинацией: page, page_size в query; items, total, total_pages в ответе)
    response:
      items:
        uuid: string
        name: string
        price: number
        address: string
        floor: number      # optional
        area: number
        has_tenant: boolean
        media: object
      total: number
      page: number
      page_size: number
      total_pages: number

  - GET /premises/<uuid>
    детали помещения
    response:
      uuid: string
      name: string
      price: number
      address: string
      floor: number
      area: number
      has_tenant: boolean
      media: object
      description: string      # optional
      price_per_sqm: number   # optional
      ceiling_height: number   # optional
      has_windows: boolean
      has_parking: boolean
      is_furnished: boolean

  - GET /premises/link?uuid=...
    referral-ссылка


# ───────────────────────────────────────────────────────────────────
# CASES
# ───────────────────────────────────────────────────────────────────

cases:
  - GET /cases/<cat>
    strategies

  - GET /cases/all
    все кейсы


# ───────────────────────────────────────────────────────────────────
# USER
# ───────────────────────────────────────────────────────────────────

user:
  - GET /profile/user
    информация о пользователе

  - PUT /profile/profile
    обновление профиля

  - GET /profile/objects
    объекты пользователя

  - GET /profile/bookings
    бронирования


# ───────────────────────────────────────────────────────────────────
# ОБЩИЕ СХЕМЫ
# ───────────────────────────────────────────────────────────────────

MedialList:
  type: "photo | video"
  link: string
