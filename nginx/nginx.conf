user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Подключение конфигураций upstream
    include /etc/nginx/conf.d/upstream.conf;

    # Подключение конфигурации кеша
    include /etc/nginx/conf.d/cache.conf;

    # Подключение конфигурации rate limiting
    include /etc/nginx/conf.d/rate-limit.conf;

    # Подключение конфигурации gzip
    include /etc/nginx/conf.d/gzip.conf;

    # Map для обработки OPTIONS запросов
    map $request_method $options_method {
        default 0;
        OPTIONS 1;
    }

    # Map для WebSocket соединений
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Map для текстов ошибок API
    map $status $status_text {
        429 "Too Many Requests";
        502 "Bad Gateway";
        503 "Service Unavailable";
        504 "Gateway Timeout";
        default "Error";
    }

    # Map для детальных описаний ошибок API
    map $status $error_detail {
        429 "Rate limit exceeded. Please try again later.";
        502 "The server received an invalid response from the upstream server.";
        503 "The server is temporarily unable to handle the request.";
        504 "The server did not receive a timely response from the upstream server.";
        default "An error occurred while processing the request.";
    }

    # JSON формат логирования
    log_format json_combined escape=json
    '{'
    '"time_local":"$time_local",'
    '"remote_addr":"$remote_addr",'
    '"remote_user":"$remote_user",'
    '"request":"$request",'
    '"status": "$status",'
    '"body_bytes_sent":"$body_bytes_sent",'
    '"request_time":"$request_time",'
    '"http_referrer":"$http_referer",'
    '"http_user_agent":"$http_user_agent",'
    '"http_x_forwarded_for":"$http_x_forwarded_for",'
    '"request_id":"$request_id",'
    '"upstream_addr":"$upstream_addr",'
    '"upstream_status":"$upstream_status",'
    '"upstream_response_time":"$upstream_response_time",'
    '"upstream_connect_time":"$upstream_connect_time"'
    '}';

    # Оптимизация производительности
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # HTTP: продакшен — ACME и редирект на HTTPS (сертификат на aregrp.ru покрывает www)
    server {
        listen 80;
        server_name aregrp.ru www.aregrp.ru;

        access_log /var/log/nginx/access.log json_combined;
        error_log /var/log/nginx/error.log warn;

        client_max_body_size 10M;
        client_body_buffer_size 128k;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
            try_files $uri =404;
            allow all;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTP: локально / без домена — без принудительного HTTPS
    server {
        listen 80 default_server;
        server_name localhost;

        access_log /var/log/nginx/access.log json_combined;
        error_log /var/log/nginx/error.log warn;

        client_max_body_size 10M;
        client_body_buffer_size 128k;

        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
            try_files $uri =404;
            allow all;
        }

        include /etc/nginx/includes/backend-location.conf;
        include /etc/nginx/includes/frontend-location.conf;
    }

    server {
        listen 443 ssl http2;
        server_name aregrp.ru www.aregrp.ru;

        ssl_certificate /etc/letsencrypt/live/aregrp.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/aregrp.ru/privkey.pem;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        access_log /var/log/nginx/access.log json_combined;
        error_log /var/log/nginx/error.log warn;

        client_max_body_size 10M;
        client_body_buffer_size 128k;

        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        include /etc/nginx/includes/backend-location.conf;
        include /etc/nginx/includes/frontend-location.conf;
    }
}