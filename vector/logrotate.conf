# logrotate config for aregrp logs written by Vector
# Installed into the vector container at /etc/logrotate.d/aregrp via Dockerfile
# Runs daily at 02:00 via BusyBox crond inside the vector container
#
# Manual dry-run (from host):
#   docker exec aregrp-vector logrotate -d /etc/logrotate.d/aregrp
#
# Force rotate now (from host):
#   docker exec aregrp-vector logrotate -f /etc/logrotate.d/aregrp

/var/log/aregrp/**/*.log
{
    # Rotate daily (Vector already creates new files per day via %Y-%m-%d in path,
    # but logrotate is responsible for compressing and pruning old files)
    daily

    # Keep 14 days of logs
    rotate 14

    # Compress rotated files with gzip
    compress

    # Delay compression by one rotation cycle (so the just-rotated file isn't
    # compressed immediately, giving Vector time to finish writing to it)
    delaycompress

    # Don't fail if a log file is missing (e.g. no errors today)
    missingok

    # Don't rotate empty files
    notifempty

    # Create new empty log file after rotation with these permissions
    create 0640 root root

    # Match files in subdirectories (backend/ and nginx/)
    # Note: requires logrotate >= 3.9.0 (standard on Ubuntu 18.04+)
    sharedscripts
}
