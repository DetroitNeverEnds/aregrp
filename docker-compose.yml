services:
    # Frontend контейнер
    frontend:
        image: ${REGISTRY_PREFIX:-}aregrp-frontend:${TAG:-local}
        build:
            context: frontend
            args:
                VITE_YANDEX_MAPS_API_KEY: ${VITE_YANDEX_MAPS_API_KEY}
                VITE_YANDEX_METRIKA_ID: ${VITE_YANDEX_METRIKA_ID}
        container_name: aregrp-frontend
        restart: unless-stopped
        networks:
            - frontend-network
        volumes:
            # Для hot reload в development режиме (опционально)
            - ./frontend/src:/app/src:ro
        environment:
            - NODE_ENV=production
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "5"

    db:
        image: postgres:17
        volumes:
            # Данные БД хранятся вне проекта для безопасности при деплое
            - /var/lib/aregrp-data/postgres_data:/var/lib/postgresql/data
        env_file:
            - ./backend/.env.postgres
        networks:
            - django-network
        restart: always
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "5"

    backend:
        image: ${REGISTRY_PREFIX:-}aregrp-backend:${TAG:-local}
        build: backend
        container_name: aregrp-backend
        ports:
            - "8000:8000"
        depends_on:
            - db
        volumes:
            # Медиафайлы и статика также хранятся вне проекта
            - /var/lib/aregrp-data/media:/app/media
            - /var/lib/aregrp-data/static:/app/static
        env_file:
            - ./backend/.env
            - ./backend/.env.postgres
        networks:
            - backend-network
            - django-network
        restart: always
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "5"

    # Nginx reverse proxy
    nginx:
        image: ${REGISTRY_PREFIX:-}aregrp-nginx:${TAG:-local}
        build: nginx
        container_name: aregrp-nginx
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./nginx/logs:/var/log/nginx
            # Те же пути в контейнере, что в nginx/includes/backend-location.conf (alias /static/, /media/).
            - /var/lib/aregrp-data/static:/var/lib/aregrp-data/static:ro
            - /var/lib/aregrp-data/media:/var/lib/aregrp-data/media:ro
            # Весь /etc/letsencrypt: в live/ лежат symlink → archive/; отдельно только .pem монтировать нельзя.
            - /etc/letsencrypt:/etc/letsencrypt:ro
            # Webroot для certbot renew --webroot -w ... (на хосте должен совпадать с -w при выпуске).
            - /var/lib/aregrp-data/certbot-www:/var/www/certbot:ro
        depends_on:
            - frontend
            - backend
        networks:
            - frontend-network
            - backend-network
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "5"

    # Log aggregator: reads backend stdout (Docker API) + nginx files, writes to /var/log/aregrp/
    # Built from vector/Dockerfile (vector + logrotate + dcron)
    vector:
        build: vector
        image: ${REGISTRY_PREFIX:-}aregrp-vector:${TAG:-local}
        container_name: aregrp-vector
        restart: unless-stopped
        volumes:
            # Docker socket for reading backend container logs
            - /var/run/docker.sock:/var/run/docker.sock:ro
            # Nginx host-mounted log files (read-only source)
            - ./nginx/logs:/var/log/nginx-src:ro
            # Output directory for aggregated logs
            - /var/log/aregrp:/var/log/aregrp
        logging:
            driver: json-file
            options:
                max-size: "5m"
                max-file: "3"

networks:
    frontend-network:
        driver: bridge
    backend-network:
        driver: bridge
    django-network:
        driver: bridge

volumes:
    nginx-cache:
        driver: local
